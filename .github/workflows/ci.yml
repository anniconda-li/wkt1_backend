name: wkt-intercom-server CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install --requirement requirements.txt

      - name: Compile Python sources
        run: python -m compileall server tests

      - name: Run unit tests
        run: python -m unittest discover -s tests -p "test*.py"

  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build wkt-intercom-server image
        run: docker build --tag wkt-intercom-server:ci .
